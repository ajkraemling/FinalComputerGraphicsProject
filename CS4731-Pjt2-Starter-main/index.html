<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CS 4731 Final Project</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .gl-canvas {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #webgl {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <script id="vshader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec4 vColor;
        attribute vec4 vNormal;
        attribute vec2 vTexCoord;

        uniform mat4 uMVP;
        uniform mat4 uMV;
        uniform mat4 uModel;
        uniform mat3 uNormalMatrix;
        uniform mat4 shadowMatrix;
        uniform mat4 uSkyboxMVP;
        uniform bool isSkybox;
        uniform bool uShadowPass;


        varying vec3 N, V, pos;
        varying vec4 fColor;
        varying vec3 fNormalEye;
        varying vec3 fPositionEye;
        varying vec3 fNormal;
        varying vec2 fTexCoord;
        varying vec3 fWorldPos;


        void main() {
            if (isSkybox) {
                fWorldPos = vPosition.xyz;
                gl_Position = uSkyboxMVP * vPosition;
                return;
            }
            if (uShadowPass) {

                    gl_Position = uMVP * shadowMatrix * uModel * vPosition;
                    return;
                 }
            vec4 posEye = uMV * vPosition;
            fPositionEye = posEye.xyz;
            fNormalEye = normalize((uMV * vNormal).xyz);
            fNormal = normalize(vNormal.xyz);

            pos = (uModel * vPosition).xyz;

            N = normalize(uNormalMatrix * vNormal.xyz);
            V = normalize(-fPositionEye);
            gl_Position = uMVP * vPosition;
            fTexCoord = vTexCoord;
            fColor = vColor;

            }
    </script>

    <script id="fshader" type="x-shader/x-fragment">
        precision mediump float;

        varying vec4 fColor;
        varying vec3 fNormalEye;
        varying vec3 fPositionEye;
        varying vec3 fNormal;
        varying vec2 fTexCoord;
        varying vec3 fWorldPos;


        // Phong lighting uniforms (file 1)
        uniform vec4 lightDiffuse;
        uniform vec4 lightSpecular;
        uniform vec4 lightAmbient;
        uniform vec4 materialSpecular;
        uniform vec4 materialAmbient;
        uniform float shininess;

        // Texture / skybox uniforms (file 2)
        varying vec3 N, V, pos;
        uniform sampler2D uSampler;
        uniform sampler2D uSkySampler;
        uniform bool uTextured;
        uniform bool isSkybox;
        uniform bool uShadowPass;
        uniform vec4 lightPosition;


        void main() {
            if (isSkybox) {
                vec3 dir = normalize(fWorldPos);
                float u = 0.5 - atan(dir.z, dir.x) / (2.0 * 3.14159265);
                float v = 0.5 - asin(dir.y) / 3.14159265;
                gl_FragColor = texture2D(uSkySampler, vec2(u, v));
                return;
            }
            if (uShadowPass) {
                gl_FragColor = vec4(0.0, 0.0, 0.0, 0.5);
                return;
            }
            // Base color: texture or per-vertex color
            vec4 baseColor;
            if (uTextured) {
                baseColor = texture2D(uSampler, fTexCoord);
            } else {
                baseColor = fColor;
            }

            vec3 L = normalize(lightPosition.xyz - pos);
            vec3 spotDir = normalize(vec3(0.0, -1.0,0.0));
            float spotCutoff = .3;
            float spotEffect = dot(-L,spotDir);

            vec4 color = lightAmbient * materialAmbient * baseColor;

            if (spotEffect > spotCutoff) {
                float intensity = pow(spotEffect, 3.0);
                vec3 R = (2.0 * dot(L, N) * N) - L;
                vec4 diffuse  = lightDiffuse  * baseColor        * max(dot(L, N), 0.0);
                vec4 specular = lightSpecular * materialSpecular * pow(max(dot(V, R), 0.0), shininess);
                color += intensity * (diffuse + specular);
            }

            color.a = 1.0;
            gl_FragColor = color;
        }
    </script>

    <script type="text/javascript" src="lib/webgl-utils.js"></script>
    <script type="text/javascript" src="lib/initShaders.js"></script>
    <script type="text/javascript" src="lib/MV.js"></script>

    <script type="text/javascript" src="lib/model.js"></script>
    <script type="text/javascript" src="lib/face.js"></script>
    <script type="text/javascript" src="main.js"></script>

</head>
