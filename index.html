<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CS 4731 Final Project</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .gl-canvas {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        #webgl {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <script id="vshader" type="x-shader/x-vertex">
        attribute vec4 vPosition;
        attribute vec4 vColor;
        attribute vec3 vNormal;
        attribute vec2 vTexCoord;

        uniform mat4 uMVP;
        uniform mat4 uMV;
        uniform mat4 uSkyboxMVP;
        uniform bool isSkybox;

        varying vec4 fColor;
        varying vec3 fNormalEye;
        varying vec3 fPositionEye;
        varying vec3 fNormal;
        varying vec2 fTexCoord;
        varying vec3 fWorldPos;

        void main() {
            if (isSkybox) {
                fWorldPos = vPosition.xyz;
                gl_Position = uSkyboxMVP * vPosition;
            } else {
                vec4 posEye = uMV * vPosition;
                fPositionEye = posEye.xyz;
                fNormalEye = normalize((uMV * vec4(vNormal, 0.0)).xyz);
                fNormal = normalize(vNormal);
                fTexCoord = vTexCoord;
                fColor = vColor;
                gl_Position = uMVP * vPosition;
            }
        }
    </script>

    <script id="fshader" type="x-shader/x-fragment">
        precision mediump float;

        varying vec4 fColor;
        varying vec3 fNormalEye;
        varying vec3 fPositionEye;
        varying vec3 fNormal;
        varying vec2 fTexCoord;
        varying vec3 fWorldPos;

        uniform vec3 uLightDirection;

        // Phong lighting uniforms (file 1)
        uniform vec4 lightDiffuse;
        uniform vec4 lightSpecular;
        uniform vec4 lightAmbient;
        uniform vec4 materialSpecular;
        uniform vec4 materialAmbient;
        uniform float shininess;

        // Texture / skybox uniforms (file 2)
        uniform vec4 uLightColor;
        uniform vec4 uAmbientColor;
        uniform sampler2D uSampler;
        uniform sampler2D uSkySampler;
        uniform bool uTextured;
        uniform bool isSkybox;

        void main() {
            if (isSkybox) {
                vec3 dir = normalize(fWorldPos);
                float u = 0.5 - atan(dir.z, dir.x) / (2.0 * 3.14159265);
                float v = 0.5 - asin(dir.y) / 3.14159265;
                gl_FragColor = texture2D(uSkySampler, vec2(u, v));
                return;
            }

            // Base color: texture or per-vertex color
            vec4 baseColor;
            if (uTextured) {
                baseColor = texture2D(uSampler, fTexCoord);
            } else {
                baseColor = fColor;
            }

            vec3 N = normalize(fNormalEye);
            vec3 L = normalize(uLightDirection);
            vec3 V = normalize(-fPositionEye);

            // Diffuse
            float nDotL = max(dot(N, L), 0.0);
            vec4 diffuse = lightDiffuse * baseColor * nDotL;

            // Specular (Phong reflection)
            vec3 R = reflect(-L, N);
            float specFactor = pow(max(dot(R, V), 0.0), shininess);
            vec4 specular = lightSpecular * materialSpecular * specFactor;

            // Ambient
            vec4 ambient = lightAmbient * materialAmbient;

            vec4 color = ambient + diffuse + specular;
            color.a = 1.0;
            gl_FragColor = color;
        }
    </script>

    <script type="text/javascript" src="lib/webgl-utils.js"></script>
    <script type="text/javascript" src="lib/initShaders.js"></script>
    <script type="text/javascript" src="lib/MV.js"></script>

    <script type="text/javascript" src="lib/model.js"></script>
    <script type="text/javascript" src="lib/face.js"></script>
    <script type="text/javascript" src="main.js"></script>

</head>

    <body onload="main()">
        <h1 id="mode">CS 4731 Final Project</h1>
        <!-- <div id="pointerLockInfo">Click to enable camera control (Press ESC to unlock)</div> -->

        <div class="gl-canvas">
            <canvas id="webgl">
                Please use a browser that supports the "canvas" tag.
            </canvas>
        </div>
    </body>
</html>
